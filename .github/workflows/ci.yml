name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libclang-dev \
            libpcsclite-dev \
            libusb-1.0-0-dev \
            pkg-config

      - name: Check generated PKCS #11 bindings
        run: cargo xtask bindings --check

      - name: Run Rust tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run Python ABI tests
        run: python3 test_pkcs11.py

  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile Rust tests
        run: cargo test --locked --no-run

      - name: Check ABI test backend
        run: cargo check --locked --features abi-tests
