name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libclang-dev \
            libpcsclite-dev \
            libusb-1.0-0-dev \
            pkg-config

      - name: Check generated PKCS #11 bindings
        run: cargo xtask bindings --check

      - name: Run Rust tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run Python ABI tests
        run: python3 test_pkcs11.py

      - name: Run OASIS PKCS #11 3.2 profile cases
        run: python3 conformance/run_oasis.py --results target/oasis-results

      - name: Upload OASIS profile results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oasis-pkcs11-v3.2-results
          path: target/oasis-results
          if-no-files-found: warn

  msrv:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpcsclite-dev \
            libusb-1.0-0-dev \
            pkg-config

      - name: Check minimum supported Rust version
        run: cargo check --locked --all-features

  dependency-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check library advisories and licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses

      - name: Check binding generator advisories and licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses
          manifest-path: ./xtask/Cargo.toml

  macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          brew install libusb pkg-config

      - name: Check generated PKCS #11 bindings
        run: cargo xtask bindings --check

      - name: Build dylib
        run: cargo build --locked

      - name: Run Rust tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Check ABI test backend
        run: cargo check --locked --features abi-tests

  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile Rust tests
        run: cargo test --locked --no-run

      - name: Check ABI test backend
        run: cargo check --locked --features abi-tests
