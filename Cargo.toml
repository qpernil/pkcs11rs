[package]
name = "pkcs11rs"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]      # Creates dynamic lib
# crate-type = ["staticlib"] # Creates static lib

[features]
abi-tests = []

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
rusb = "0.9.4"
pcsc = "2.9.0"
curl = "0.4.50"
openssl = "0.10.81"
zeroize = "1.9.0"

[build-dependencies]
bindgen = "0.72.1"
