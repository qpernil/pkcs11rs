[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
unmaintained = "workspace"
unsound = "all"
# Stable rsa has no patched release for the Marvin timing advisory. Production
# private keys are parsed only for transfer to hardware; software RSA private
# operations are confined to the synthetic ABI test backend.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
]
